name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Patch react-native-gesture-handler
        run: |
          GESTURE_FILE="node_modules/react-native-gesture-handler/android/build.gradle"
          if [ -f "$GESTURE_FILE" ]; then
            # Add buildFeatures right after android {
            sed -i '/android {/a\    buildFeatures {\n        buildConfig true\n    }' "$GESTURE_FILE"
            echo "✓ Patched react-native-gesture-handler"
            
            # Verify the patch
            echo "Verifying patch:"
            grep -A 5 "buildFeatures" "$GESTURE_FILE" || echo "Warning: buildFeatures not found"
          else
            echo "Error: File not found - $GESTURE_FILE"
            ls -la node_modules/react-native-gesture-handler/android/
            exit 1
          fi
      
      - name: Setup Android SDK
        run: |
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          
          mkdir -p $ANDROID_SDK_ROOT/licenses
          echo "8933bad05af43bd7f4b3dfbb81832d9787e68977" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license
      
      - name: Setup proper Gradle wrapper
        run: |
          cd android
          rm -f gradlew gradlew.bat
          rm -rf gradle/wrapper
          
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.0.2/gradle/wrapper/gradle-wrapper.jar
          curl -L -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.0.2/gradlew
          curl -L -o gradlew.bat https://raw.githubusercontent.com/gradle/gradle/v8.0.2/gradlew.bat
          chmod +x gradlew gradlew.bat
          
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOL'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOL
          
          cd ..
      
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties
      
      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets
      
      - name: Create Keystore
        working-directory: android/app
        run: |
          keytool -genkeypair -v \
            -keystore datalake.keystore \
            -alias datalake \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass datalake123 \
            -keypass datalake123 \
            -dname "CN=Datalake, OU=Hackathon, O=Datalake, L=City, S=State, C=IN"
      
      - name: Create Keystore Properties
        working-directory: android/app
        run: |
          echo "storeFile=datalake.keystore" > keystore.properties
          echo "storePassword=datalake123" >> keystore.properties
          echo "keyAlias=datalake" >> keystore.properties
          echo "keyPassword=datalake123" >> keystore.properties
      
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
