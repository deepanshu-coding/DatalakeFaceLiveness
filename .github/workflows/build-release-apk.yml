name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Clear cache
        run: |
          npm cache clean --force
          rm -rf node_modules package-lock.json
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Install Metro and Babel dependencies
        run: |
          npm install --save-dev @react-native/metro-config
          npm install --save-dev metro-react-native-babel-preset
          npm install --save-dev @babel/plugin-transform-runtime @babel/helpers
      
      - name: Fix Babel configuration
        run: |
          cat > babel.config.js << 'EOF'
          module.exports = {
            presets: ['module:metro-react-native-babel-preset'],
            plugins: [
              '@babel/plugin-transform-flow-strip-types',
              '@babel/plugin-transform-runtime'
            ]
          };
          EOF
      
      - name: Setup Android SDK
        run: |
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          
          mkdir -p $ANDROID_SDK_ROOT/licenses
          echo "8933bad05af43bd7f4b3dfbb81832d9787e68977" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license
      
      - name: Setup Gradle Wrapper
        run: |
          cd android
          chmod +x gradlew
          cd ..
      
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties
      
      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets
      
      - name: Create metro.config.js
        run: |
          cat > metro.config.js << 'EOF'
          module.exports = {
            transformer: {
              getTransformOptions: async () => ({
                transform: {
                  experimentalImportSupport: false,
                  inlineRequires: true,
                },
              }),
            },
          };
          EOF
      
      - name: Create Keystore
        working-directory: android/app
        run: |
          keytool -genkeypair -v \
            -keystore datalake.keystore \
            -alias datalake \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass datalake123 \
            -keypass datalake123 \
            -dname "CN=Datalake, OU=Hackathon, O=Datalake, L=City, S=State, C=IN"
      
      - name: Create Keystore Properties
        working-directory: android/app
        run: |
          echo "storeFile=datalake.keystore" > keystore.properties
          echo "storePassword=datalake123" >> keystore.properties
          echo "keyAlias=datalake" >> keystore.properties
          echo "keyPassword=datalake123" >> keystore.properties
      
      - name: Bundle React Native app
        run: npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
