name: Build Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Accept licenses and install components
        run: |
          # Try both possible SDK locations
          for SDK_PATH in "$ANDROID_HOME" "/usr/local/lib/android/sdk"; do
            if [ -f "$SDK_PATH/cmdline-tools/latest/bin/sdkmanager" ]; then
              echo "Using SDK at: $SDK_PATH"
              yes | $SDK_PATH/cmdline-tools/latest/bin/sdkmanager --licenses
              yes | $SDK_PATH/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
            fi
          done
      
      - name: Create local.properties
        run: |
          if [ -d "$ANDROID_HOME" ]; then
            echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          else
            echo "sdk.dir=/usr/local/lib/android/sdk" > android/local.properties
          fi
          cat android/local.properties
      
      - name: Generate keystore
        run: |
          cd android/app
          keytool -genkeypair -v \
            -keystore datalake.keystore \
            -alias datalake \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass datalake123 \
            -keypass datalake123 \
            -dname "CN=Datalake, OU=Hackathon, O=Datalake, L=City, S=State, C=IN"
      
      - name: Create keystore.properties
        run: |
          cat > android/app/keystore.properties << EOF
          storeFile=datalake.keystore
          storePassword=datalake123
          keyAlias=datalake
          keyPassword=datalake123
          EOF
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon --stacktrace
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: datalake-liveness-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
