name: Build Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
      
      - name: Setup Android SDK
        run: |
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          
          mkdir -p $ANDROID_SDK_ROOT/licenses
          echo "8933bad05af43bd7f4b3dfbb81832d9787e68977" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license
      
      - name: Generate keystore
        run: |
          cd android/app
          keytool -genkeypair -v \
            -keystore datalake.keystore \
            -alias datalake \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass datalake123 \
            -keypass datalake123 \
            -dname "CN=Datalake, OU=Hackathon, O=Datalake, L=City, S=State, C=IN"
      
      - name: Create keystore.properties
        run: |
          cat > android/app/keystore.properties << EOF
          storeFile=datalake.keystore
          storePassword=datalake123
          keyAlias=datalake
          keyPassword=datalake123
          EOF
      
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
      
      - name: Setup Gradle wrapper
        run: |
          cd android
          if [ ! -f gradlew ]; then
            mkdir -p gradle/wrapper
            curl -L https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
            curl -L https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
            echo '#!/bin/bash' > gradlew
            echo 'exec java -cp "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
          fi
          chmod +x gradlew
      
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: datalake-liveness-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
