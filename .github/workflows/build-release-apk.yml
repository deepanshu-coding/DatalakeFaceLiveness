name: Build Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
      
      # NO setup-android step - use pre-installed SDK instead
      - name: Set up Android SDK environment
        run: |
          # Use pre-installed SDK
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          
          # Accept all licenses by creating the files directly
          mkdir -p $ANDROID_SDK_ROOT/licenses
          
          # Add license acceptances
          echo "8933bad05af43bd7f4b3dfbb81832d9787e68977" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-googletv-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
          
          # Verify SDK
          echo "Android SDK path: $ANDROID_SDK_ROOT"
          ls -la $ANDROID_SDK_ROOT/
      
      - name: Generate keystore
        run: |
          cd android/app
          keytool -genkeypair -v \
            -keystore datalake.keystore \
            -alias datalake \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass datalake123 \
            -keypass datalake123 \
            -dname "CN=Datalake, OU=Hackathon, O=Datalake, L=City, S=State, C=IN"
      
      - name: Create keystore.properties
        run: |
          cat > android/app/keystore.properties << EOF
          storeFile=datalake.keystore
          storePassword=datalake123
          keyAlias=datalake
          keyPassword=datalake123
          EOF
      
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          cat android/local.properties
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: datalake-liveness-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
