name: Build Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
      
      - name: Accept ALL Android SDK licenses FIRST (using pre-installed SDK)
        run: |
          # Use the pre-installed SDK manager before setup-android overwrites it
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
      
      - name: Setup Android SDK (now licenses are already accepted)
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
      
      - name: Generate keystore
        run: |
          cd android/app
          keytool -genkeypair -v \
            -keystore datalake.keystore \
            -alias datalake \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass datalake123 \
            -keypass datalake123 \
            -dname "CN=Datalake, OU=Hackathon, O=Datalake, L=City, S=State, C=IN"
      
      - name: Create keystore.properties
        run: |
          cat > android/app/keystore.properties << EOF
          storeFile=datalake.keystore
          storePassword=datalake123
          keyAlias=datalake
          keyPassword=datalake123
          EOF
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: datalake-liveness-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
