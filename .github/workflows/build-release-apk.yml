name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Install Metro dependencies
        run: |
          npm install --save-dev @react-native/metro-config
          npm install --save-dev metro-react-native-babel-preset
      
      - name: Setup Android SDK
        run: |
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          
          mkdir -p $ANDROID_SDK_ROOT/licenses
          echo "8933bad05af43bd7f4b3dfbb81832d9787e68977" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license
      
      - name: Setup Gradle Wrapper
        run: |
          cd android
          rm -f gradlew gradlew.bat
          rm -rf gradle/wrapper
          
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.0.2/gradle/wrapper/gradle-wrapper.jar
          
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOL'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOL
          
          curl -L -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.0.2/gradlew
          chmod +x gradlew
          curl -L -o gradlew.bat https://raw.githubusercontent.com/gradle/gradle/v8.0.2/gradlew.bat
          
          cd ..
      
      - name: Create settings.gradle (CRITICAL FIX)
        run: |
          cat > android/settings.gradle << 'EOL'
          rootProject.name = 'DatalakeFaceLiveness'
          apply from: file("../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesSettingsGradle(settings)
          include ':app'
          EOL
          echo "✓ settings.gradle created successfully"
      
      - name: Create root build.gradle
        run: |
          cat > android/build.gradle << 'EOL'
          buildscript {
              ext {
                  buildToolsVersion = "34.0.0"
                  minSdkVersion = 23
                  compileSdkVersion = 34
                  targetSdkVersion = 34
                  ndkVersion = "23.1.7779620"
                  kotlinVersion = "1.8.0"
              }
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath("com.android.tools.build:gradle:8.1.1")
                  classpath("com.facebook.react:react-native-gradle-plugin")
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://www.jitpack.io' }
              }
          }
          EOL
          echo "✓ build.gradle created successfully"
      
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties
      
      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets
      
      - name: Create metro.config.js if not exists
        run: |
          if [ ! -f metro.config.js ]; then
            cat > metro.config.js << 'EOL'
          const {getDefaultConfig, mergeConfig} = require('@react-native/metro-config');
          const config = {};
          module.exports = mergeConfig(getDefaultConfig(__dirname), config);
          EOL
            echo "✓ metro.config.js created"
          else
            echo "✓ metro.config.js already exists"
          fi
      
      - name: Create Keystore
        working-directory: android/app
        run: |
          keytool -genkeypair -v \
            -keystore datalake.keystore \
            -alias datalake \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass datalake123 \
            -keypass datalake123 \
            -dname "CN=Datalake, OU=Hackathon, O=Datalake, L=City, S=State, C=IN"
      
      - name: Create Keystore Properties
        working-directory: android/app
        run: |
          cat > keystore.properties << 'EOL'
          storeFile=datalake.keystore
          storePassword=datalake123
          keyAlias=datalake
          keyPassword=datalake123
          EOL
      
      - name: Bundle React Native app
        run: npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon --stacktrace
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
      
      - name: Upload Debug APK (if exists)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
