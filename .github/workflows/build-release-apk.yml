name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Setup Android SDK
        run: |
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          
          mkdir -p $ANDROID_SDK_ROOT/licenses
          echo "8933bad05af43bd7f4b3dfbb81832d9787e68977" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license
      
      - name: Fix Gradle Wrapper
        run: |
          cd android
          # Remove corrupted gradlew
          rm -f gradlew gradlew.bat
          rm -rf gradle/wrapper
          
          # Generate proper Gradle wrapper
          # First, create a temporary build.gradle to generate wrapper
          cat > temp_build.gradle << 'EOF'
          task wrapper(type: Wrapper) {
              gradleVersion = '8.5'
              distributionType = Wrapper.DistributionType.BIN
          }
          EOF
          
          # Use gradle from system to generate wrapper
          gradle-8.5 --version 2>/dev/null || true
          
          # Download and setup gradle wrapper properly
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar 2>/dev/null || {
            # If direct download fails, use gradle init
            mkdir -p gradle/wrapper
            echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
            echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
            echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
            echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
            echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          }
          
          # Create gradlew script
          cat > gradlew << 'EOF'
          #!/bin/sh
          #
          # Copyright © 2015-2021 the original authors.
          #
          # Licensed under the Apache License, Version 2.0 (the "License");
          # you may not use this file except in compliance with the License.
          # You may obtain a copy of the License at
          #
          #      https://www.apache.org/licenses/LICENSE-2.0
          #
          # Unless required by applicable law or agreed to in writing, software
          # distributed under the License is distributed on an "AS IS" BASIS,
          # WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
          # See the License for the specific language governing permissions and
          # limitations under the License.
          #

          ##############################################################################
          #
          #   Gradle start up script for POSIX generated by Gradle.
          #
          #   Important for running:
          #
          #   (1) You need a POSIX-compliant shell to run this script. If your /bin/sh is
          #       noncompliant, but you have some other compliant shell such as ksh or
          #       bash, then you need to set the SHELL environment variable to point to
          #       that shell before running this script, e.g.:
          #           SHELL=/usr/bin/ksh gradlew
          #
          #       Also, if you are using a noncompliant /bin/sh, some operations might fail,
          #       e.g., the `cygpath` utility might not exist, causing problems with Cygwin.
          #
          #   (2) This script attempts to detect the ability to use `exec` and other
          #       features to improve startup performance.
          #
          ##############################################################################

          # Attempt to set APP_HOME

          # Resolve links: $0 may be a link
          app_path=$0

          # Need this for daisy-chained symlinks.
          while
              APP_HOME=${app_path%"${app_path##*/}"}  # leaves a trailing /; empty if no leading path
              [ -h "$app_path" ]
          do
              ls=$(ls -ld "$app_path")
              link=${ls#*' -> '}
              case $link in             #(
                /*)   app_path=$link ;; #(
                *)    app_path=$APP_HOME$link ;;
              esac
          done

          # This is normally unused
          # shellcheck disable=SC2034
          APP_BASE_NAME=${0##*/}
          APP_HOME=$(cd "${APP_HOME:-./}" && pwd -P) || exit

          # Use the maximum available file descriptors if possible
          if command -v ulimit > /dev/null ; then
              ulimit -n 4096 || true
          fi

          # Add default JVM options here. You can also use JAVA_OPTS and GRADLE_OPTS to pass JVM options to this script.
          DEFAULT_JVM_OPTS='"-Xmx64m" "-Xms64m"'

          # Collect all arguments for the java command;
          #   * $DEFAULT_JVM_OPTS, $JAVA_OPTS, and $GRADLE_OPTS can contain fragments of
          #     shell script including quotes and variable substitutions, so put them in
          #     double quotes to safely expand and interpolate them.
          #   * The following architecture-specific options may also need to be set, but
          #     are not directly supported. See `java --help` for additional details.
          #       -d64, -client, -server, -hotspot, -XX:+UseSerialGC

          # Use the location of the java binary to set java.library.path
          if [ -n "$JAVA_HOME" ] ; then
              if [ -x "$JAVA_HOME/jre/sh/java" ] ; then
                  # IBM's JDK on AIX uses strange locations for the executables
                  JAVACMD=$JAVA_HOME/jre/sh/java
              else
                  JAVACMD=$JAVA_HOME/bin/java
              fi
              if [ ! -x "$JAVACMD" ] ; then
                  die "ERROR: JAVA_HOME is set to an invalid directory: $JAVA_HOME

          Please set the JAVA_HOME variable in your environment to match the
          location of your Java installation."
              fi
          else
              JAVACMD=java
              if ! command -v java > /dev/null; then
                  die "ERROR: JAVA_HOME is not set and no 'java' command could be found in your PATH.

          Please set the JAVA_HOME variable in your environment to match the
          location of your Java installation."
              fi
          fi

          # Increase the maximum file descriptors if we can.
          if ! "$cygwin" && ! "$darwin" ; then
              MAX_FD_LIMIT=$(ulimit -n)
              if [ $MAX_FD_LIMIT -le 4096 ] ; then
                  MAX_FD_LIMIT=65536
                  ulimit -n $MAX_FD_LIMIT
              fi
          fi

          # Collect all arguments for the java command;
          #   * $DEFAULT_JVM_OPTS, $JAVA_OPTS, and $GRADLE_OPTS can contain fragments of
          #     shell script including quotes and variable substitutions, so put them in
          #     double quotes to safely expand and interpolate them.
          #   * The following architecture-specific options may also need to be set, but
          #     are not directly supported. See `java --help` for additional details.
          #       -d64, -client, -server, -hotspot, -XX:+UseSerialGC

          # Escape application args
          save () {
              for i do printf %s\\n "$i" | sed "s/'/'\\\\''/g;1s/^/'/;\$s/\$/' \\\\/" ; done
              echo " "
          }
          APP_ARGS=$(save "$@")

          # Collect all arguments for the java command;
          #   * $APP_ARGS (standard application arguments)
          #   * $JAVA_ARGS (collected from _JAVA_OPTIONS and JAVA_OPTS, etc, via `buildJavaArgs`)

          set -- \
              -Dorg.gradle.appname="$APP_BASE_NAME" \
              -classpath "$APP_HOME/gradle/wrapper/gradle-wrapper.jar" \
              org.gradle.wrapper.GradleWrapperMain \
              $APP_ARGS

          # Determine the Java command to use to start the JVM.
          # This implementation is incomplete, but we can keep it for compatibility
          if [ -n "$JAVACMD" ] ; then
              if [ -x "$JAVACMD" ] ; then
                  exec "$JAVACMD" "$@"
              else
                  echo "ERROR: JAVA_HOME is set to an invalid directory: $JAVA_HOME" >&2
                  echo "Please set the JAVA_HOME variable in your environment to match the" >&2
                  echo "location of your Java installation." >&2
                  exit 1
              fi
          else
              echo "ERROR: JAVA_HOME is not set and no 'java' command could be found in your PATH." >&2
              echo "Please set the JAVA_HOME variable in your environment to match the" >&2
              echo "location of your Java installation." >&2
              exit 1
          fi
          EOF
          
          chmod +x gradlew
          
          # Create gradlew.bat for Windows (optional)
          cat > gradlew.bat << 'EOF'
          @rem
          @rem Copyright 2015 the original author or authors.
          @rem
          @rem Licensed under the Apache License, Version 2.0 (the "License");
          @rem you may not use this file except in compliance with the License.
          @rem You may obtain a copy of the License at
          @rem
          @rem      https://www.apache.org/licenses/LICENSE-2.0
          @rem
          @rem Unless required by applicable law or agreed to in writing, software
          @rem distributed under the License is distributed on an "AS IS" BASIS,
          @rem WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
          @rem See the License for the specific language governing permissions and
          @rem limitations under the License.
          @rem

          @if "%DEBUG%"=="" @echo off
          @rem ##########################################################################
          @rem
          @rem  Gradle startup script for Windows
          @rem
          @rem ##########################################################################

          @rem Set local scope for the variables with windows NT shell
          if "%OS%"=="Windows_NT" setlocal

          set DIRNAME=%~dp0
          if "%DIRNAME%"=="" set DIRNAME=.
          @rem This is normally unused
          set APP_BASE_NAME=%~n0
          set APP_HOME=%DIRNAME%

          @rem Resolve any "." and ".." in APP_HOME to make it shorter.
          for %%i in ("%APP_HOME%") do set APP_HOME=%%~fi

          @rem Add default JVM options here. You can also use JAVA_OPTS and GRADLE_OPTS to pass JVM options to this script.
          set DEFAULT_JVM_OPTS="-Xmx64m" "-Xms64m"

          @rem Find java.exe
          if defined JAVA_HOME goto findJavaFromJavaHome

          set JAVA_EXE=java.exe
          %JAVA_EXE% -version >NUL 2>&1
          if %ERRORLEVEL% equ 0 goto execute

          echo.
          echo ERROR: JAVA_HOME is not set and no 'java' command could be found in your PATH.
          echo.
          echo Please set the JAVA_HOME variable in your environment to match the
          echo location of your Java installation.

          goto fail

          :findJavaFromJavaHome
          set JAVA_HOME=%JAVA_HOME:"=%
          set JAVA_EXE=%JAVA_HOME%/bin/java.exe

          if exist "%JAVA_EXE%" goto execute

          echo.
          echo ERROR: JAVA_HOME is set to an invalid directory: %JAVA_HOME%
          echo.
          echo Please set the JAVA_HOME variable in your environment to match the
          echo location of your Java installation.

          goto fail

          :execute
          @rem Setup the command line

          set CLASSPATH=%APP_HOME%\gradle\wrapper\gradle-wrapper.jar


          @rem Execute Gradle
          "%JAVA_EXE%" %DEFAULT_JVM_OPTS% %JAVA_OPTS% %GRADLE_OPTS% "-Dorg.gradle.appname=%APP_BASE_NAME%" -classpath "%CLASSPATH%" org.gradle.wrapper.GradleWrapperMain %*

          :end
          @rem End local scope for the variables with windows NT shell
          if %ERRORLEVEL% equ 0 goto mainEnd

          :fail
          rem Set variable GRADLE_EXIT_CONSOLE if you need the _script_ return code instead of
          rem the _cmd.exe /c_ return code!
          set EXIT_CODE=%ERRORLEVEL%
          if %EXIT_CODE% equ 0 set EXIT_CODE=1
          if not ""=="%GRADLE_EXIT_CONSOLE%" exit %EXIT_CODE%
          exit /b %EXIT_CODE%

          :mainEnd
          if "%OS%"=="Windows_NT" endlocal

          :omega
          EOF
      
      - name: Create missing Gradle files
        run: |
          cd android
          
          # Create settings.gradle if missing
          if [ ! -f settings.gradle ]; then
            cat > settings.gradle << 'EOF'
            rootProject.name = 'DatalakeFaceLiveness'
            apply from: file("../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesSettingsGradle(settings)
            include ':app'
            includeBuild('../node_modules/@react-native/gradle-plugin')
            EOF
          fi
          
          # Ensure build.gradle has proper configuration
          cat > build.gradle << 'EOF'
          buildscript {
              ext {
                  buildToolsVersion = "34.0.0"
                  minSdkVersion = 23
                  compileSdkVersion = 34
                  targetSdkVersion = 34
                  ndkVersion = "25.1.8937393"
                  kotlinVersion = "1.9.22"
              }
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath("com.android.tools.build:gradle:8.1.1")
                  classpath("com.facebook.react:react-native-gradle-plugin")
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://www.jitpack.io' }
              }
          }
          EOF
      
      - name: Create Keystore
        working-directory: android/app
        run: |
          keytool -genkeypair -v \
            -keystore datalake.keystore \
            -alias datalake \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass datalake123 \
            -keypass datalake123 \
            -dname "CN=Datalake, OU=Hackathon, O=Datalake, L=City, S=State, C=IN"
      
      - name: Create Keystore Properties
        working-directory: android/app
        run: |
          cat > keystore.properties << EOF
          storeFile=datalake.keystore
          storePassword=datalake123
          keyAlias=datalake
          keyPassword=datalake123
          EOF
      
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties
      
      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets
      
      - name: Bundle React Native app
        run: npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon --stacktrace
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
