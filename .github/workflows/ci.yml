name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: cd android && ./gradlew assembleRelease
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: cd ios && pod install
      - run: cd ios && xcodebuild -workspace DatalakeFaceLiveness.xcworkspace -scheme DatalakeFaceLiveness -configuration Release
